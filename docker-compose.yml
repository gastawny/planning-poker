services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      ROOM_TTL_SECONDS: ${ROOM_TTL_SECONDS:-86400}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
    ports:
      - "3000:3001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost}
    ports:
      - "80:3000"
    depends_on:
      - server
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
